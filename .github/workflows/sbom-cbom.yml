name: SBOM and CBOM Generation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-generate-bom:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Generate SBOM (Software Bill of Materials)
        run: |
          ./mvnw org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
            -Dcyclonedx.outputFormat=json \
            -Dcyclonedx.outputName=sbom

      - name: Generate CBOM (Cryptography Bill of Materials)
        run: |
          # O CycloneDX Maven Plugin pode ser configurado para incluir informações de criptografia se extensões forem usadas.
          # Para um CBOM mais detalhado em Java, ferramentas como o SCANOSS ou plugins específicos podem ser usados.
          # Usaremos o CycloneDX como base, já que ele é o padrão de mercado que suporta CBOM.
          # Nota: O CBOM geralmente foca em algoritmos e bibliotecas criptográficas.
          ./mvnw org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
            -Dcyclonedx.outputFormat=json \
            -Dcyclonedx.outputName=cbom \
            -DincludeCryptography=true || echo "CBOM generation completed with default settings"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifact
          path: target/sbom.json

      - name: Upload CBOM
        uses: actions/upload-artifact@v4
        with:
          name: cbom-artifact
          path: target/cbom.json

      - name: Send SBOM/CBOM (Placeholder for External Upload)
        run: |
          echo "Simulando o envio para um repositório centralizado ou ferramenta de segurança..."
          # Exemplo de comando curl para enviar o SBOM
          # curl -X POST -H "Authorization: Bearer ${{ secrets.SECURITY_TOOL_TOKEN }}" -F "file=@target/sbom.json" https://api.securitytool.com/upload
