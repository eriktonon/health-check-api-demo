# Datasource configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/demo_db

# Hibernate configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# REST Client configuration
quarkus.rest-client.jsonplaceholder-api.url=https://jsonplaceholder.typicode.com

# Kafka configuration
kafka.bootstrap.servers=localhost:9092

# Producer configuration
mp.messaging.outgoing.data-events-out.connector=smallrye-kafka
mp.messaging.outgoing.data-events-out.topic=data_events
mp.messaging.outgoing.data-events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer configuration
mp.messaging.incoming.data-events-in.connector=smallrye-kafka
mp.messaging.incoming.data-events-in.topic=data_events
mp.messaging.incoming.data-events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.data-events-in.auto.offset.reset=earliest

# HTTP configuration
quarkus.http.port=8080

# OpenAPI / Swagger UI configuration
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
mp.openapi.extensions.smallrye.info.title=Demo de Integracao - API, Kafka e PostgreSQL
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Aplicacao demo que demonstra Integracao entre API Externa (JSONPlaceholder), Apache Kafka e PostgreSQL
mp.openapi.extensions.smallrye.info.contact.name=Edge Search
mp.openapi.extensions.smallrye.info.contact.email=contato@edgesearch.io

# SmallRye Health configuration
quarkus.smallrye-health.root-path=/health
quarkus.smallrye-health.liveness-path=/health/live
quarkus.smallrye-health.readiness-path=/health/ready
